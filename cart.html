<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>CART</title>
	<link rel="stylesheet" type="text/css" href="styles.css">
</head>
<body>
	<div class="navbar">
		<div class="logo">
			<img src="Images/logo.png">
		</div>
		<nav class="navigation">
			<a href="index.html">HOME</a>
			<a href="menu.html">MENU</a>
			<a href="cart.html">CART</a>
			<a href="singlepage.html">WEBDESIGN</a>
		</nav>

	<div class="cart">
		<h2>Place your order with us</h2>
		<div class="cart-details">
			<div class="cart-image">
				<img src="Images/order-image.jpeg">
			</div>
			<div class="order-form">
				<form>
					<div class="inputs">
						<input type="text" name="first-name" placeholder="First Name">
						<br>
						<input type="text" name="email" placeholder="Enter Email">
						<br>
						<input type="number" name="number" placeholder="0700-000-000">
						<br>
						<textarea placeholder="Enter Instructions"></textarea>
						<br>
						<button>Place Order</button>
					</div>
				</form>
			</div>
		</div>
	</div>

	<footer class="footer">
		<div class="facts">
			<h3>Did you know?</h3>
			<p>Coffee is the second most traded commodity in the world after oil!</p>
		</div>
